<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAE Lead Command Center</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b0e14;
            --surface: #161b22;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --verified: #238636;
            --pending: #d29922;
            --active: #1f6feb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }

        .header {
            background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
            padding: 2rem;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #30363d;
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--primary); display: block; }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .main-content { padding: 0 2rem 2rem 2rem; }
        
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; }
        th { background: #21262d; padding: 1rem; text-align: left; font-size: 0.9rem; color: var(--text-dim); }
        td { padding: 1rem; border-bottom: 1px solid #30363d; font-size: 0.95rem; }
        tr:hover { background: #1c2128; }

        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-verified { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; }
        .badge-pending { background: rgba(210, 153, 34, 0.2); color: #d29922; border: 1px solid #9e7a27; }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary { background: var(--active); color: white; }
        .btn-ghost { background: transparent; border: 1px solid #30363d; color: var(--text); }
        .btn-ghost:hover { background: #30363d; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }

        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-online { background: #3fb950; box-shadow: 0 0 10px #3fb950; }
        .status-paused { background: #f85149; }

        .search-row { margin-bottom: 1rem; display: flex; gap: 1rem; }
        .search-input { 
            background: #0d1117; 
            border: 1px solid #30363d; 
            color: white; 
            padding: 0.5rem 1rem; 
            border-radius: 6px; 
            width: 300px;
        }

        .action-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    </style>
</head>
<body>
    <header class="header">
        <div>
            <h1 style="font-size: 1.5rem;"><i class="fas fa-shield-halved" style="color: var(--primary);"></i> DUBAI LEAD COMMAND</h1>
            <p style="font-size: 0.8rem; color: var(--text-dim);">Real-time Market Intelligence Engine</p>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <div>
                <span id="status-indicator" class="status-dot status-online"></span>
                <span id="agent-status" style="font-weight: 600;">ACTIVE</span>
            </div>
            <button onclick="toggleEngine()" id="toggle-btn" class="btn btn-ghost">
                <i class="fas fa-pause"></i> PAUSE ENGINE
            </button>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <span id="found-today" class="stat-value">0</span>
            <span class="stat-label">Found Today</span>
        </div>
        <div class="stat-card">
            <span id="total-leads" class="stat-value">0</span>
            <span class="stat-label">Total Pipeline</span>
        </div>
        <div class="stat-card">
            <span id="serper-stat" class="stat-value">0</span>
            <span class="stat-label">Discovery API</span>
        </div>
        <div class="stat-card">
            <span id="gemini-stat" class="stat-value">0</span>
            <span class="stat-label">AI Analysis</span>
        </div>
    </div>

    <div class="main-content">
        <div class="search-row">
            <input type="text" id="table-search" class="search-input" placeholder="Search companies or industries..." onkeyup="filterTable()">
            <div style="flex-grow: 1;"></div>
            <a href="/api/download/all" class="btn btn-ghost btn-sm"><i class="fas fa-download"></i> CSV ALL</a>
            <a href="/api/download/verified" class="btn btn-primary btn-sm"><i class="fas fa-check-double"></i> VERIFIED HQ</a>
        </div>
        
        <table id="leads-table">
            <thead>
                <tr>
                    <th>COMPANY</th>
                    <th>FUNDING / ROUND</th>
                    <th>SIGNAL & MISSION</th>
                    <th>CONTACT</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="leads-body">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>

    <script>
        let currentStatus = "Active";

        function filterTable() {
            const input = document.getElementById("table-search");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("leads-table");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                const td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    const txtValue = td.textContent || td.innerText;
                    tr[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
                }
            }
        }

        function createRow(lead) {
            const row = document.createElement('tr');
            const score = lead.confidence_score || 0;
            const badgeClass = score > 80 ? 'badge-verified' : 'badge-pending';
            const badgeText = score > 80 ? 'HQ VERIFIED' : 'PENDING';
            
            row.innerHTML = `
                <td>
                    <div style="font-weight: 800; color: #fff;">${lead.company}</div>
                    <div style="font-size: 0.8rem; color: var(--text-dim);">${lead.industry || 'Tech'}</div>
                    <span class="badge ${badgeClass}" style="margin-top: 5px; display: inline-block;">${badgeText}</span>
                </td>
                <td>
                    <div style="color: #62ffaa; font-weight: 600;">${lead.funding_amount || 'Seed'}</div>
                    <div style="font-size: 0.8rem; color: var(--text-dim);">${lead.funding_round || 'Undisclosed'}</div>
                </td>
                <td style="max-width:300px">
                    <div style="font-size: 0.85rem; margin-bottom: 4px;"><strong>Signal:</strong> ${lead.strategic_signal || 'N/A'}</div>
                    <div style="font-size: 0.85rem; color: var(--text-dim);"><strong>Opp:</strong> ${lead.integration_opportunity || 'N/A'}</div>
                </td>
                <td>
                    <div style="font-weight: 600;">${lead.contact_name || 'Founder/CEO'}</div>
                    <div style="font-size: 0.8rem; color: var(--primary);">
                        <a href="https://www.google.com/search?q=${encodeURIComponent(lead.contact_name + ' ' + lead.company + ' LinkedIn')}" target="_blank" style="color: inherit; text-decoration: none;">
                            <i class="fab fa-linkedin"></i> Find on LinkedIn
                        </a>
                    </div>
                </td>
                <td>
                    <div class="action-group">
                        <button onclick="copyPitch('${lead.company.replace(/'/g, "\\'")}', '${lead.funding_amount}', '${lead.funding_round}', '${(lead.strategic_signal || "").replace(/'/g, "\\'")}')" class="btn btn-primary btn-sm">
                            <i class="fas fa-copy"></i> PITCH
                        </button>
                        <button onclick="manualVerify('${lead.company.replace(/'/g, "\\'")}', this)" class="btn btn-ghost btn-sm">
                            <i class="fas fa-check"></i>
                        </button>
                        <a href="${lead.url}" target="_blank" class="btn btn-ghost btn-sm"><i class="fas fa-external-link-alt"></i></a>
                    </div>
                </td>
            `;
            return row;
        }

        async function updateDashboard() {
            try {
                const [usageRes, leadsRes] = await Promise.all([
                    fetch('/api/usage').then(r => r.json()),
                    fetch('/api/updates').then(r => r.json())
                ]);

                document.getElementById('found-today').innerText = usageRes.today_count;
                document.getElementById('total-leads').innerText = usageRes.total_leads;
                document.getElementById('serper-stat').innerText = usageRes.Serper;
                document.getElementById('gemini-stat').innerText = usageRes.Gemini;
                document.getElementById('agent-status').innerText = usageRes.status;

                const indicator = document.getElementById('status-indicator');
                indicator.className = 'status-dot ' + (usageRes.status.includes('Active') ? 'status-online' : 'status-paused');
                
                const toggleBtn = document.getElementById('toggle-btn');
                toggleBtn.innerHTML = usageRes.status.includes('Paused') ? '<i class="fas fa-play"></i> RESUME ENGINE' : '<i class="fas fa-pause"></i> PAUSE ENGINE';

                const body = document.getElementById('leads-body');
                body.innerHTML = '';
                leadsRes.forEach(lead => body.appendChild(createRow(lead)));
            } catch (e) {
                console.error("Dashboard error:", e);
            }
        }

        async function toggleEngine() {
            const btn = document.getElementById('toggle-btn');
            const action = btn.innerText.includes('RESUME') ? 'start' : 'stop';
            await fetch('/api/control', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action })
            });
            updateDashboard();
        }

        async function manualVerify(company, btn) {
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            await fetch('/api/verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ company })
            });
            updateDashboard();
        }

        function copyPitch(company, funding, round, signal) {
            const pitch = `Hi,\n\nI saw that ${company} recently raised ${funding} in a ${round} round. Your focus on ${signal} is impressive.\n\nMy team specializes in scaling engineering teams for high-growth startups in the UAE. Would you be open to a quick chat about your roadmap?`;
            navigator.clipboard.writeText(pitch);
            alert("Copy-paste pitch ready for " + company);
        }

        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
