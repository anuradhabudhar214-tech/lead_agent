name: 🇦🇪 UAE Auditor - Diagnostic Cycle

on:
  push:
    branches: [ main ]
  schedule:
    # Trigger every 1 hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Professional Dependencies
        run: |
          pip install -r requirements.txt

      - name: 🚀 Execute Intelligence Audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          SERPER_API_KEYS: ${{ secrets.SERPER_API_KEYS }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEYS }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          python crunchbase_tracker_cloud.py
