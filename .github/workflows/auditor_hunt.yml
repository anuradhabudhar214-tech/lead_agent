name: 🇦🇪 UAE Auditor - Hourly Hunt Cycle

on:
  push:
    branches: [ main ]
  schedule:
    # Hyper-Frequency Triple Redundancy (Guarantees on-time starts)
    - cron: '*/20 * * * *'    # 0, 20, 40
    - cron: '10,30,50 * * * *' # 10, 30, 50
    - cron: '5,25,45 * * * *'  # 5, 25, 45 (Bypass GitHub Lag)
  workflow_run:
    workflows: ["🇦🇪 UAE Auditor - Diagnostic Cycle"]
    types:
      - completed
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Professional Dependencies
        run: |
          pip install -r requirements.txt

      - name: 🚀 Execute Intelligence Audit
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          SERPER_API_KEYS: ${{ secrets.SERPER_API_KEYS }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEYS }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          python crunchbase_tracker_cloud.py

      - name: 📁 Persist Local Intelligence (CSV Backup)
        run: |
          git config --global user.name "Desert Intel Bot"
          git config --global user.email "bot@desertintel.ae"
          if [ -f enterprise_leads.csv ]; then
            git add -f enterprise_leads.csv
            git commit -m "📊 Intelligence Sync: Updated lead harvest backup" || echo "No changes to commit"
            git push origin main || echo "Push skipped"
          else
            echo "No CSV file generated this run, skipping commit."
          fi
